<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#155e75">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GestaMed">
  <meta name="gestamed-build" content="2026.07.23.113">
  <title>GestaMed</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #gmBoot{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;color:#155e75;text-align:center}
    #gmBoot>div{background:#fff;border:1px solid #dbeafe;border-radius:20px;padding:22px 24px;box-shadow:0 12px 30px rgba(15,23,42,.08);font-weight:800}
    .gmSpin{width:30px;height:30px;margin:0 auto 12px;border:3px solid #bae6fd;border-top-color:#0891b2;border-radius:50%;animation:gmSpin .8s linear infinite}
    @keyframes gmSpin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="gmBoot"><div><div class="gmSpin"></div>Carregando GestaMed…</div></div>
  <script>
  (async function () {
    'use strict';
    try {
      var response = await fetch('./app-core-stable.html?v=2026.07.23.113', { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      var html = await response.text();

      var cssResumo = '#fatalError{display:none!important}.exames-resumo-usg .gm-usg-title{margin:0 0 4px;color:var(--trim-color);font-weight:900;font-size:10.5px}.exames-resumo-usg .gm-usg-list{margin:0;padding:0;list-style:none}.exames-resumo-usg .gm-usg-list li{position:relative;padding:4px 2px 4px 13px;border-bottom:1px dashed rgba(148,163,184,.42)}.exames-resumo-usg .gm-usg-list li:last-child{border-bottom:0}.exames-resumo-usg .gm-usg-list li:before{content:"•";position:absolute;left:2px;top:2px;color:var(--trim-color);font-size:14px;font-weight:900}.gm-exames-grupo{margin:14px 0 9px;padding:9px 12px;border-radius:12px;font-size:11px;font-weight:900;letter-spacing:.02em}.gm-exames-grupo.rotina{background:#ecfdf5;border:1px solid #6ee7b7;color:#047857}.gm-exames-grupo.indicacao{background:#f8fafc;border:1px solid #cbd5e1;color:#475569}';
      html = html.replace('</head>', '<style id="gmAjustesPainelExames">' + cssResumo + '</style></head>');

      function substituirUltrassons(trimestre, itens) {
        var padrao = new RegExp('(<div class="exames-resumo-v2-row ' + trimestre + '">[\\s\\S]*?)<div class="exames-resumo-usg">[\\s\\S]*?<\\/div>');
        var bloco = '<div class="exames-resumo-usg"><div class="gm-usg-title">ULTRASSONOGRAFIAS</div><ul class="gm-usg-list">' + itens.map(function (item) { return '<li>' + item + '</li>'; }).join('') + '</ul></div>';
        var atualizado = html.replace(padrao, '$1' + bloco);
        if (atualizado === html) throw new Error('Bloco de ultrassons não encontrado: ' + trimestre);
        html = atualizado;
      }

      substituirUltrassons('t1', [
        '<strong>USG obstétrica inicial (preferencialmente transvaginal)</strong> — localização, viabilidade, datação e número de fetos.',
        '<strong>USG morfológica do 1º trimestre com translucência nucal</strong> — 11s a 13s6d.'
      ]);

      substituirUltrassons('t2', [
        '<strong>USG morfológica do 2º trimestre</strong> — 18 a 24 semanas.',
        '<strong>USG transvaginal para cervicometria</strong> — conforme indicação clínica/obstétrica.',
        '<strong>USG obstétrica com Doppler</strong> — conforme indicação clínica/obstétrica.'
      ]);

      substituirUltrassons('t3', [
        '<strong>USG obstétrica para avaliação do crescimento fetal</strong> — biometria, apresentação, placenta e líquido amniótico, conforme indicação/protocolo.',
        '<strong>USG obstétrica com Doppler</strong> — conforme indicação clínica/obstétrica.',
        '<strong>Perfil biofísico fetal</strong> — quando indicado para avaliação complementar da vitalidade fetal.'
      ]);

      html = html.replace('"Toxoplasmose (IgG/IgM)", "Rubéola", "TSH", "USG inicial (7-9s)",', '"Toxoplasmose (IgG/IgM)", "Rubéola (se indicada)", "USG inicial (se indicada)",');
      html = html.replace('</body>', '<script src="./exam-panel-patch.js?v=2026.07.23.113"><\/script><script src="./search-fix.js?v=2026.07.23.113"><\/script></body>');
      html = html.split('2026.07.23.97').join('2026.07.23.113');

      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      console.error('Falha ao carregar o GestaMed:', error);
      document.getElementById('gmBoot').innerHTML = '<div>Falha temporária ao carregar.<br><button type="button" onclick="location.reload()" style="margin-top:12px;border:0;border-radius:12px;padding:10px 16px;background:#0891b2;color:#fff;font-weight:800">Tentar novamente</button></div>';
    }
  })();
  </script>
</body>
</html>

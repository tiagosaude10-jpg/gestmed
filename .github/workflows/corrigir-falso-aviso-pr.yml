name: Corrigir falso aviso do GestaMed

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  corrigir:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch da correção
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Remover falso aviso sem alterar o aplicativo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')

          old = '''    // Watchdog: verificação final de segurança. Se por qualquer motivo o app
    // não tiver inicializado até aqui (ex.: erro de timing em algum visualizador
    // sandboxed), tenta de novo manualmente e, falhando, mostra erro visível
    // em vez de deixar a tela travada sem explicação nenhuma.
    setTimeout(function () {
      try {
        var totalBadge = document.getElementById("totalBadge");
        var stillPlaceholder = totalBadge && totalBadge.textContent.trim().startsWith("—");
        if (stillPlaceholder) {
          if (window.GestMedApp && typeof window.GestMedApp.forceInit === "function") {
            window.GestMedApp.forceInit();
          }
          // Revalida depois de tentar de novo
          setTimeout(function () {
            var stillBroken = totalBadge && totalBadge.textContent.trim().startsWith("—");
            if (stillBroken) {
              var box = document.getElementById("fatalError");
              if (box) {
                box.style.display = "block";
                box.textContent =
                  "⚠ O aplicativo não conseguiu carregar os dados neste navegador/visualizador. " +
                  "Tente abrir o arquivo diretamente no Safari (fora de qualquer app de prévia) " +
                  "ou em outro navegador.";
              }
            }
          }, 300);
        }
      } catch (e) {
        // Nada mais a fazer sem acesso ao DOM
      }
    }, 1000);'''

          new = '''    // Nova tentativa silenciosa para dispositivos que demoram mais para concluir a inicialização.
    // O aplicativo permanece utilizável e não exibe aviso falso durante o carregamento.
    setTimeout(function () {
      try {
        var totalBadge = document.getElementById("totalBadge");
        var stillPlaceholder = totalBadge && totalBadge.textContent.trim().startsWith("—");
        if (stillPlaceholder && window.GestMedApp && typeof window.GestMedApp.forceInit === "function") {
          window.GestMedApp.forceInit();
        }
      } catch (e) {
        // Mantém a interface sem bloquear o usuário.
      }
    }, 2500);'''

          if old not in content:
              raise SystemExit('Bloco exato do falso aviso não foi encontrado. Nenhum arquivo foi alterado.')

          content = content.replace(old, new, 1)
          content = content.replace('2026.07.23.97', '2026.07.23.104')
          path.write_text(content, encoding='utf-8')
          PY

      - name: Validar resultado
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          content = Path('index.html').read_text(encoding='utf-8')
          assert 'O aplicativo não conseguiu carregar os dados neste navegador/visualizador' not in content
          assert '<iframe' not in content
          assert '2026.07.23.104' in content
          assert content.count('<!DOCTYPE html>') == 1
          print('Validação concluída: HTML monolítico, falso aviso removido.')
          PY

      - name: Publicar correção na branch
        shell: bash
        run: |
          git config user.name "GestaMed Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/corrigir-falso-aviso-pr.yml
          git add index.html
          git commit -m "Remove falso aviso de carregamento sem alterar os botões"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

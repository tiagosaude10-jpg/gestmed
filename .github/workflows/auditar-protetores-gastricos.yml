name: Auditar protetores gastricos

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/auditar-protetores-gastricos.yml'
      - 'scripts/auditar_protetores.js'
      - 'backups/gestamed-base-603-1503-fonte.html'
      - 'index.html'

permissions:
  contents: read

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Auditar base permanente
        shell: bash
        run: |
          set +e
          node scripts/auditar_protetores.js > auditoria-execucao.log 2>&1
          STATUS=$?
          cat auditoria-execucao.log
          if [ ! -f auditoria-protetores.json ]; then
            printf '{"status":"erro","codigo":%s,"log":%s}\n' "$STATUS" "$(python3 -c 'import json; print(json.dumps(open("auditoria-execucao.log",encoding="utf-8",errors="replace").read()))')" > auditoria-protetores.json
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auditoria-protetores-gastricos
          path: |
            auditoria-protetores.json
            auditoria-execucao.log
          retention-days: 1

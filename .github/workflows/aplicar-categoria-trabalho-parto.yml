name: Aplicar categoria trabalho de parto

on:
  push:
    branches: [main]
    paths:
      - 'triggers/aplicar-categoria-trabalho-parto.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar categoria e validar JavaScript
        run: python scripts/aplicar_categoria_trabalho_parto.py
      - name: Publicar alteração
        run: |
          if git diff --quiet -- index.html; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git config user.name 'GestaMed Atualizador'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html
          git commit -m 'Organiza visualmente o bloco trabalho de parto [skip ci]'
          git push

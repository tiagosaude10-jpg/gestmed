name: Corrigir falso aviso do GestaMed

on:
  push:
    paths:
      - '.github/workflows/corrigir-aviso-automatico.yml'
  issues:
    types: [opened]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  corrigir:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Executar correção do falso aviso'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Corrigir somente o falso aviso
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')

          old = '''    // Watchdog: verificação final de segurança. Se por qualquer motivo o app
    // não tiver inicializado até aqui (ex.: erro de timing em algum visualizador
    // sandboxed), tenta de novo manualmente e, falhando, mostra erro visível
    // em vez de deixar a tela travada sem explicação nenhuma.
    setTimeout(function () {
      try {
        var totalBadge = document.getElementById("totalBadge");
        var stillPlaceholder = totalBadge && totalBadge.textContent.trim().startsWith("—");
        if (stillPlaceholder) {
          if (window.GestMedApp && typeof window.GestMedApp.forceInit === "function") {
            window.GestMedApp.forceInit();
          }
          // Revalida depois de tentar de novo
          setTimeout(function () {
            var stillBroken = totalBadge && totalBadge.textContent.trim().startsWith("—");
            if (stillBroken) {
              var box = document.getElementById("fatalError");
              if (box) {
                box.style.display = "block";
                box.textContent =
                  "⚠ O aplicativo não conseguiu carregar os dados neste navegador/visualizador. " +
                  "Tente abrir o arquivo diretamente no Safari (fora de qualquer app de prévia) " +
                  "ou em outro navegador.";
              }
            }
          }, 300);
        }
      } catch (e) {
        // Nada mais a fazer sem acesso ao DOM
      }
    }, 1000);'''

          new = '''    // Nova tentativa silenciosa para dispositivos que demoram mais para concluir a inicialização.
    setTimeout(function () {
      try {
        var totalBadge = document.getElementById("totalBadge");
        var stillPlaceholder = totalBadge && totalBadge.textContent.trim().startsWith("—");
        if (stillPlaceholder && window.GestMedApp && typeof window.GestMedApp.forceInit === "function") {
          window.GestMedApp.forceInit();
        }
      } catch (e) {}
    }, 2500);'''

          if old not in content:
              if 'O aplicativo não conseguiu carregar os dados neste navegador/visualizador' not in content:
                  print('Aviso já removido; nenhuma alteração necessária.')
                  raise SystemExit(0)
              raise SystemExit('Bloco exato não encontrado; nenhuma alteração realizada.')

          content = content.replace(old, new, 1)
          content = content.replace('2026.07.23.97', '2026.07.23.105')
          path.write_text(content, encoding='utf-8')
          PY

      - name: Validar aplicativo completo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          content = Path('index.html').read_text(encoding='utf-8')
          assert content.count('<!DOCTYPE html>') == 1
          assert '<iframe' not in content
          assert 'O aplicativo não conseguiu carregar os dados neste navegador/visualizador' not in content
          assert 'Painel de Exames' in content
          assert 'Cálculo de insulina' in content
          assert 'Condutas Obstétricas' in content
          assert 'Base de medicamentos' in content
          print('Validação concluída.')
          PY

      - name: Publicar correção
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Nenhuma alteração pendente.'
            exit 0
          fi
          git config user.name "GestaMed Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/corrigir-aviso-automatico.yml
          git add index.html
          git commit -m "Remove falso aviso sem alterar o aplicativo"
          git push origin main

      - name: Fechar solicitação
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close ${{ github.event.issue.number }} --comment "Correção executada e validada."

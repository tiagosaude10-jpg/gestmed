name: Revisar painel de exames

on:
  push:
    branches: [main]
    paths:
      - 'scripts/revisar_painel_exames.py'
      - 'updates/condutas-*.json'
      - '.github/workflows/revisar-painel-exames.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-index:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Integrar protocolos pendentes ao index
        run: |
          python - <<'PY'
          from pathlib import Path
          import ast
          import json
          import re

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')
          marker = 'const PROTOCOLOS='
          start = text.index(marker) + len(marker)
          end = text.index('];\n\n  const modal', start) + 1
          protocolos = json.loads(text[start:end])
          ordem_ids = [p['id'] for p in protocolos]
          por_id = {p['id']: p for p in protocolos}
          versoes = []

          for arquivo in sorted(Path('updates').glob('condutas-*.json')):
              pacote = json.loads(arquivo.read_text(encoding='utf-8'))
              versoes.append(pacote.get('version', ''))
              for protocolo in pacote.get('protocols', []):
                  pid = protocolo['id']
                  if pid not in por_id:
                      ordem_ids.append(pid)
                  por_id[pid] = protocolo

          protocolos_atualizados = [por_id[pid] for pid in ordem_ids]
          bloco = json.dumps(protocolos_atualizados, ensure_ascii=False, separators=(',', ':'))
          text = text[:start] + bloco + text[end:]

          category_defs = {
              'Trabalho de parto e indução': {
                  'theme': 'theme-trabalho', 'icon': '🤰',
                  'desc': 'Indução, condução e distócias funcionais do trabalho de parto, com atenção à ocitocina, progressão e via de parto.'
              },
              'Puerpério': {
                  'theme': 'theme-puerperio', 'icon': '🍼',
                  'desc': 'Intercorrências clínicas e obstétricas do pós-parto, incluindo hipertensão, infecção, lactação e tromboembolismo.'
              },
              'Infecções específicas e transmissão vertical': {
                  'theme': 'theme-transmissao', 'icon': '🧬',
                  'desc': 'Infecções com repercussão materno-fetal e medidas para reduzir transmissão vertical durante pré-natal, parto e puerpério.'
              },
              'Doenças clínicas especiais na gestação': {
                  'theme': 'theme-especiais', 'icon': '🫀',
                  'desc': 'Condições clínicas maternas de maior complexidade, exigindo seguimento multidisciplinar, ajustes terapêuticos e vigilância materno-fetal.'
              },
              'Saúde mental e complicações tardias do puerpério': {
                  'theme': 'theme-mental', 'icon': '🧠',
                  'desc': 'Transtornos emocionais e psiquiátricos do pós-parto, com rastreio, segurança materno-infantil e articulação com a RAPS.'
              }
          }

          ordem_match = re.search(r"const ordem=(\[[^;]+\]);", text)
          if ordem_match:
              categorias = ast.literal_eval(ordem_match.group(1))
              for categoria in category_defs:
                  if categoria not in categorias:
                      categorias.append(categoria)
              novo = 'const ordem=' + json.dumps(categorias, ensure_ascii=False, separators=(',', ':')) + ';'
              text = text[:ordem_match.start()] + novo + text[ordem_match.end():]

          meta_match = re.search(r'const categoryMeta=(\{.*?\});\n\s*const metaCategoria=', text, flags=re.S)
          if meta_match:
              meta = meta_match.group(1)
              for categoria, dados in category_defs.items():
                  chave = json.dumps(categoria, ensure_ascii=False)
                  if chave not in meta:
                      entrada = chave + ':' + json.dumps(dados, ensure_ascii=False, separators=(',', ':'))
                      meta = meta[:-1] + ',' + entrada + '}'
              novo = 'const categoryMeta=' + meta + ';\n    const metaCategoria='
              text = text[:meta_match.start()] + novo + text[meta_match.end():]

          css_rules = {
              'theme-trabalho': '.condutas-group.theme-trabalho .condutas-group-head{background:linear-gradient(135deg,#0f766e,#0ea5a4)}',
              'theme-puerperio': '.condutas-group.theme-puerperio .condutas-group-head{background:linear-gradient(135deg,#be185d,#ec4899)}',
              'theme-transmissao': '.condutas-group.theme-transmissao .condutas-group-head{background:linear-gradient(135deg,#4338ca,#7c3aed)}',
              'theme-especiais': '.condutas-group.theme-especiais .condutas-group-head{background:linear-gradient(135deg,#7c2d12,#b45309)}',
              'theme-mental': '.condutas-group.theme-mental .condutas-group-head{background:linear-gradient(135deg,#4c1d95,#7c3aed)}'
          }
          anchor = '.conduta-card{'
          pos = text.find(anchor)
          if pos >= 0:
              additions = ''.join(rule for theme, rule in css_rules.items() if f'.condutas-group.{theme} ' not in text)
              if additions:
                  text = text[:pos] + additions + text[pos:]

          versoes = [v for v in versoes if v]
          if versoes:
              versao = max(versoes, key=lambda value: int(value.rsplit('.', 1)[1]))
              text = re.sub(r'2026\.07\.22\.\d+', versao, text)

          index_path.write_text(text, encoding='utf-8')
          print(f'Total de protocolos após integração: {len(protocolos_atualizados)}')
          PY

      - name: Auditar doses de ocitocina
        run: python scripts/auditar_ocitocina.py

      - name: Revisar painel de exames
        run: python scripts/revisar_painel_exames.py

      - name: Publicar index atualizado
        run: |
          if git diff --quiet -- index.html; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git config user.name 'GestaMed Atualizador'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html
          git commit -m 'Revisa painel de exames por semana gestacional [skip ci]'
          git push

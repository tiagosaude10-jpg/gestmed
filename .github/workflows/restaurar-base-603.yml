name: Restaurar base 603-1503

on:
  push:
    paths:
      - '.restore-base-603-trigger'

permissions:
  contents: write

jobs:
  restaurar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar histórico completo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Recuperar somente a base e preservar o aplicativo atual
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import shutil
          import subprocess

          SOURCE_COMMIT = 'bccc584d321348e68a77c5e6039beb4355a9fa30'
          BUILD = '2026.07.23.114'

          historical = subprocess.check_output(
              ['git', 'show', f'{SOURCE_COMMIT}:index.html'], text=True
          )
          core_path = Path('app-core-stable.html')
          index_path = Path('index.html')
          current_core = core_path.read_text(encoding='utf-8')
          current_index = index_path.read_text(encoding='utf-8')

          backups = Path('backups')
          backups.mkdir(exist_ok=True)
          (backups / 'gestamed-base-603-1503-fonte.html').write_text(historical, encoding='utf-8')
          (backups / 'app-core-antes-restauracao-base.html').write_text(current_core, encoding='utf-8')

          start_marker = '// data.js — GestMed'
          end_marker = '// app.js — GestMed'

          def extract_data_block(text):
              start = text.index(start_marker)
              app_start = text.index(end_marker, start)
              script_open = text.rfind('<script', 0, start)
              script_open_end = text.index('>', script_open) + 1
              script_close = text.rfind('</script>', start, app_start)
              return text[script_open_end:script_close]

          historical_data = extract_data_block(historical)

          if '"total_registros":1503' not in historical_data:
              raise SystemExit('A fonte histórica não contém total_registros=1503.')
          if '"registros_base_clinica":603' not in historical_data:
              raise SystemExit('A fonte histórica não contém registros_base_clinica=603.')
          if '"registros_adicionais_indexacao":900' not in historical_data:
              raise SystemExit('A fonte histórica não contém registros_adicionais_indexacao=900.')

          required = [
              'Butilbrometo de escopolamina (Buscopan)',
              'Buscopan Composto',
              'Buscoduo/Buscopan Duo',
              'const GESTMED_COMPACT',
              'const GESTMED_DATA',
              'const GESTMED_POSOLOGIA_ADULTO',
          ]
          for term in required:
              if term not in historical_data:
                  raise SystemExit(f'Termo obrigatório ausente na fonte: {term}')

          current_start = current_core.index(start_marker)
          current_app = current_core.index(end_marker, current_start)
          current_script_close = current_core.rfind('</script>', current_start, current_app)
          current_script_open = current_core.rfind('<script', 0, current_start)
          current_script_open_end = current_core.index('>', current_script_open) + 1

          restored_core = (
              current_core[:current_script_open_end]
              + historical_data
              + current_core[current_script_close:]
          )

          if restored_core.count('const GESTMED_DATA') != 1:
              raise SystemExit('Quantidade inválida de declarações GESTMED_DATA após restauração.')
          if restored_core.count('function applyFilters') != 1:
              raise SystemExit('Mecanismo original applyFilters não foi preservado.')
          for term in required[:3]:
              if term not in restored_core:
                  raise SystemExit(f'Registro restaurado ausente no núcleo final: {term}')

          restored_core = re.sub(
              r'<meta name="gestamed-build" content="[^"]+">',
              f'<meta name="gestamed-build" content="{BUILD}">',
              restored_core,
              count=1,
          )
          core_path.write_text(restored_core, encoding='utf-8')

          updated_index = current_index
          updated_index = re.sub(
              r'<meta name="gestamed-build" content="[^"]+">',
              f'<meta name="gestamed-build" content="{BUILD}">',
              updated_index,
              count=1,
          )
          updated_index = re.sub(
              r'app-core-stable\.html\?v=[0-9.]+',
              f'app-core-stable.html?v={BUILD}',
              updated_index,
              count=1,
          )
          updated_index = re.sub(
              r'<script src="\./exam-panel-patch\.js\?v=[^"]+"><\\/script><script src="\./search-fix\.js\?v=[^"]+"><\\/script>',
              f'<script src="./exam-panel-patch.js?v={BUILD}"><\\/script>',
              updated_index,
              count=1,
          )
          updated_index = updated_index.replace('2026.07.23.113', BUILD)

          if 'search-fix.js' in updated_index:
              raise SystemExit('A pesquisa paralela search-fix.js ainda está conectada.')
          if f'exam-panel-patch.js?v={BUILD}' not in updated_index:
              raise SystemExit('O patch atual do Painel de Exames não foi preservado.')
          index_path.write_text(updated_index, encoding='utf-8')

          report = f'''# Recuperação da base GestaMed

- Fonte histórica: `{SOURCE_COMMIT}`
- Registros clínicos/princípios ativos: **603**
- Registros adicionais de indexação: **900**
- Total pesquisável: **1.503**
- Mecanismo ativo: pesquisa original do aplicativo (`GESTMED_DATA` → `RAW_DATA` → `applyFilters`)
- Pesquisa paralela `search-fix.js`: removida da entrada do aplicativo
- Build: `{BUILD}`

Validações realizadas:
- metadados 603/900/1.503 presentes;
- Buscopan, Buscopan Composto e Buscoduo presentes;
- uma única declaração de `GESTMED_DATA`;
- função original `applyFilters` preservada;
- Painel de Exames preservado.
'''
          (backups / 'RELATORIO-RECUPERACAO-BASE-603.md').write_text(report, encoding='utf-8')
          PY

      - name: Validação estrutural final
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          core = Path('app-core-stable.html').read_text(encoding='utf-8')
          index = Path('index.html').read_text(encoding='utf-8')
          checks = {
              'total 1503': '"total_registros":1503' in core,
              'base 603': '"registros_base_clinica":603' in core,
              'indexação 900': '"registros_adicionais_indexacao":900' in core,
              'Buscopan': 'Butilbrometo de escopolamina (Buscopan)' in core,
              'Buscopan Composto': 'Buscopan Composto' in core,
              'Buscoduo': 'Buscoduo/Buscopan Duo' in core,
              'pesquisa original': 'function applyFilters' in core,
              'sem pesquisa paralela': 'search-fix.js' not in index,
              'painel preservado': 'exam-panel-patch.js?v=2026.07.23.114' in index,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Falharam: ' + ', '.join(failed))
          print('Todas as validações foram aprovadas.')
          PY

      - name: Publicar recuperação e remover rotina temporária
        shell: bash
        run: |
          git config user.name "GestaMed Recovery"
          git config user.email "actions@users.noreply.github.com"
          git rm .restore-base-603-trigger .github/workflows/restaurar-base-603.yml
          git add index.html app-core-stable.html backups/
          git commit -m "Restaura base completa 603/1503 e pesquisa original"
          git push origin main

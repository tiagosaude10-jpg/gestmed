name: Auditar módulo final

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/auditar-modulo-final.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auditar módulo final no index
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          marker = 'const PROTOCOLOS='
          start = text.index(marker) + len(marker)
          end = text.index('];\n\n  const modal', start) + 1
          protocolos = json.loads(text[start:end])
          categoria = 'Saúde mental e complicações tardias do puerpério'
          encontrados = [p for p in protocolos if p.get('categoria') == categoria]
          ordem_ok = categoria in text[text.find('const ordem='):text.find('const ordem=')+1500]
          meta_ok = categoria in text[text.find('const categoryMeta='):text.find('const categoryMeta=')+5000]
          linhas = [
              '# Auditoria do módulo final',
              '',
              f'- Categoria: {categoria}',
              f'- Total de patologias: {len(encontrados)}',
              f'- Presente na ordem dos botões: {"SIM" if ordem_ok else "NÃO"}',
              f'- Metadados visuais presentes: {"SIM" if meta_ok else "NÃO"}',
              '',
              '## Patologias encontradas',
          ]
          linhas += [f'- {p.get("nome", p.get("id"))}' for p in encontrados]
          Path('AUDITORIA_MODULO_FINAL.md').write_text('\n'.join(linhas)+'\n', encoding='utf-8')
          print('\n'.join(linhas))
          PY
      - name: Publicar auditoria
        run: |
          git config user.name 'GestaMed Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add AUDITORIA_MODULO_FINAL.md
          git commit -m 'Audita módulo final das patologias [skip ci]' || exit 0
          git push

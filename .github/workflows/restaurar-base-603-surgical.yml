name: Restaurar cirurgicamente base 603-1503

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  restaurar:
    if: github.event.pull_request.head.ref == 'recovery-base-603-surgical'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch de recuperação
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Transplantar somente a base de medicamentos
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          SOURCE_COMMIT = 'bccc584d321348e68a77c5e6039beb4355a9fa30'
          BUILD = '2026.07.23.114'
          START = '// data.js — GestMed'
          APP = '// app.js — GestMed'

          historical = subprocess.check_output(['git', 'show', f'{SOURCE_COMMIT}:index.html'], text=True)
          core_path = Path('app-core-stable.html')
          index_path = Path('index.html')
          current_core = core_path.read_text(encoding='utf-8')
          current_index = index_path.read_text(encoding='utf-8')

          def data_block(text):
              start = text.index(START)
              app = text.index(APP, start)
              end = text.rfind('</script>', start, app)
              if end < start:
                  raise RuntimeError('Fechamento do script de dados não localizado.')
              return start, end, text[start:end]

          _, _, historical_data = data_block(historical)
          current_start, current_end, _ = data_block(current_core)

          required_source = {
              'total 1503': '"total_registros":1503',
              'base 603': '"registros_base_clinica":603',
              'indexação 900': '"registros_adicionais_indexacao":900',
              'GESTMED_COMPACT': 'const GESTMED_COMPACT',
              'GESTMED_DATA': 'const GESTMED_DATA',
              'posologia': 'const GESTMED_POSOLOGIA_ADULTO',
              'Buscopan': 'Butilbrometo de escopolamina (Buscopan)',
              'Buscopan Composto': 'Buscopan Composto',
              'Buscoduo': 'Buscoduo/Buscopan Duo',
          }
          missing = [name for name, value in required_source.items() if value not in historical_data]
          if missing:
              raise SystemExit('Fonte histórica inválida: ' + ', '.join(missing))

          restored_core = current_core[:current_start] + historical_data + current_core[current_end:]
          restored_core = re.sub(
              r'<meta name="gestamed-build" content="[^"]+">',
              f'<meta name="gestamed-build" content="{BUILD}">',
              restored_core,
              count=1,
          )

          required_final = dict(required_source)
          required_final.update({
              'pesquisa original': 'function applyFilters',
              'render original': 'function renderSuggestions',
              'modal original': 'function openMed',
          })
          failed = [name for name, value in required_final.items() if value not in restored_core]
          if failed:
              raise SystemExit('Núcleo final inválido: ' + ', '.join(failed))
          if restored_core.count('const GESTMED_DATA') != 1:
              raise SystemExit('GESTMED_DATA duplicado após transplante.')
          if restored_core.count('function applyFilters') != 1:
              raise SystemExit('applyFilters duplicado ou ausente após transplante.')

          backups = Path('backups')
          backups.mkdir(exist_ok=True)
          (backups / 'app-core-antes-recuperacao-113.html').write_text(current_core, encoding='utf-8')
          (backups / 'gestamed-base-603-1503-fonte.html').write_text(historical, encoding='utf-8')
          core_path.write_text(restored_core, encoding='utf-8')

          updated_index = current_index
          updated_index = re.sub(
              r'<meta name="gestamed-build" content="[^"]+">',
              f'<meta name="gestamed-build" content="{BUILD}">',
              updated_index,
              count=1,
          )
          updated_index = re.sub(
              r'app-core-stable\.html\?v=[0-9.]+',
              f'app-core-stable.html?v={BUILD}',
              updated_index,
              count=1,
          )
          updated_index = re.sub(
              r'<script src="\./exam-panel-patch\.js\?v=[^"]+"><\\/script><script src="\./search-fix\.js\?v=[^"]+"><\\/script>',
              f'<script src="./exam-panel-patch.js?v={BUILD}"><\\/script>',
              updated_index,
              count=1,
          )
          updated_index = updated_index.replace('2026.07.23.113', BUILD)

          if 'search-fix.js' in updated_index:
              raise SystemExit('search-fix.js ainda está conectado ao aplicativo.')
          if f'exam-panel-patch.js?v={BUILD}' not in updated_index:
              raise SystemExit('Painel de Exames não foi preservado.')
          index_path.write_text(updated_index, encoding='utf-8')

          report = f'''# Recuperação cirúrgica da base GestaMed

- Fonte: `{SOURCE_COMMIT}`
- Núcleo visual/funcional: preservado da versão atual
- Bloco transplantado: `GESTMED_META`, `GESTMED_STRINGS`, `GESTMED_COMPACT`, `GESTMED_DATA` e posologias
- Princípios ativos clínicos: **603**
- Entradas de indexação: **900**
- Total pesquisável: **1.503**
- Pesquisa ativa: mecanismo original (`RAW_DATA`, `applyFilters`, `renderSuggestions`, `openMed`)
- `search-fix.js`: desconectado
- Painel de Exames: preservado
- Build: `{BUILD}`
'''
          (backups / 'RELATORIO-RECUPERACAO-BASE-603.md').write_text(report, encoding='utf-8')
          PY

      - name: Validar sintaxe e estrutura
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          core = Path('app-core-stable.html').read_text(encoding='utf-8')
          index = Path('index.html').read_text(encoding='utf-8')
          checks = {
              '1503': '"total_registros":1503' in core,
              '603': '"registros_base_clinica":603' in core,
              '900': '"registros_adicionais_indexacao":900' in core,
              'Buscopan': 'Butilbrometo de escopolamina (Buscopan)' in core,
              'Buscopan Composto': 'Buscopan Composto' in core,
              'Buscoduo': 'Buscoduo/Buscopan Duo' in core,
              'applyFilters': core.count('function applyFilters') == 1,
              'renderSuggestions': core.count('function renderSuggestions') == 1,
              'openMed': core.count('function openMed') == 1,
              'sem search-fix': 'search-fix.js' not in index,
              'painel': 'exam-panel-patch.js?v=2026.07.23.114' in index,
          }
          failed = [key for key, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Validação falhou: ' + ', '.join(failed))
          print('Validação concluída:', checks)
          PY

      - name: Publicar na branch de recuperação
        shell: bash
        run: |
          git config user.name "GestaMed Recovery"
          git config user.email "actions@users.noreply.github.com"
          git add app-core-stable.html index.html backups/
          if git diff --cached --quiet; then
            echo "Nada a alterar."
            exit 0
          fi
          git commit -m "Restaura cirurgicamente base 603/1503 e pesquisa original"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

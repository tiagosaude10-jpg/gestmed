name: Verificar publicacao real 126

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar navegador
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Testar endereço publicado
        run: |
          cat > verificar-publicacao.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const report=[]; const failures=[]; const runtime=[];
          const log=(...p)=>report.push(p.map(x=>typeof x==='string'?x:JSON.stringify(x,null,2)).join(' '));
          const norm=(v)=>String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
          const expect=(ok,msg)=>{if(!ok) failures.push(msg)};
          const browser=await chromium.launch({headless:true});
          const page=await browser.newPage({viewport:{width:390,height:844},userAgent:'Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Version/18.0 Mobile/15E148 Safari/604.1'});
          page.on('pageerror',e=>runtime.push('PAGEERROR '+(e.stack||e.message)));
          page.on('console',m=>{if(m.type()==='error') runtime.push('CONSOLE '+m.text())});
          let snapshot=null;
          for(let attempt=1;attempt<=12;attempt++){
            const response=await page.goto('https://tiagosaude10-jpg.github.io/gestmed/?publicacao126='+Date.now(),{waitUntil:'domcontentloaded',timeout:90000});
            await page.waitForTimeout(3500);
            snapshot=await page.evaluate(()=>({
              http:document.readyState,
              build:document.documentElement.getAttribute('data-gestamed-build'),
              base:document.documentElement.getAttribute('data-base-integrada'),
              dataLength:typeof GESTMED_DATA!=='undefined'&&Array.isArray(GESTMED_DATA)?GESTMED_DATA.length:null,
              clinical:typeof GESTMED_META!=='undefined'?GESTMED_META.registros_base_clinica:null,
              total:typeof GESTMED_META!=='undefined'?GESTMED_META.total_registros:null,
              baseName:typeof GESTMED_META!=='undefined'?GESTMED_META.nome_base:null,
              methodology:typeof GESTMED_META!=='undefined'?GESTMED_META.nota_metodologica:null,
              status:document.body?.innerText?.length||0,
              responseStatus:null
            }));
            snapshot.responseStatus=response?.status();
            log('TENTATIVA',attempt,snapshot);
            if(snapshot.build==='2026.07.24.126'&&snapshot.base==='614-1514'&&snapshot.baseName==='GestMed — Base ampliada com 1.514 entradas pesquisáveis') break;
            await page.waitForTimeout(8000);
          }
          expect(snapshot?.responseStatus===200,'HTTP diferente de 200');
          expect(snapshot?.build==='2026.07.24.126','Publicação não entregou build 126');
          expect(snapshot?.base==='614-1514','Publicação não entregou base 614-1514');
          expect(snapshot?.dataLength===1514,'Publicação não carregou 1514 registros');
          expect(snapshot?.clinical===614,'Publicação não carregou 614 fichas clínicas');
          expect(snapshot?.total===1514,'Contador total publicado diferente de 1514');
          expect(snapshot?.baseName==='GestMed — Base ampliada com 1.514 entradas pesquisáveis','Nome interno da base ainda está desatualizado');
          expect(String(snapshot?.methodology||'').startsWith('A base contém 614 registros'),'Nota metodológica ainda está desatualizada');
          expect(snapshot?.status>1000,'Interface publicada não foi montada');
          const input=page.locator('#search, #searchInput, input[type="search"], input[placeholder*="medicamento" i]').first();
          expect(await input.count()===1,'Campo de pesquisa ausente');
          for(const term of ['Ranitidina','Antak','Zantac','Esomeprazol','Dexlansoprazol','Alginato de sódio','Sucralfato','Subsalicilato de bismuto','Paracetamol','Dipirona','Buscopan']){
            await input.fill(''); await page.waitForTimeout(100); await input.fill(term); await page.waitForTimeout(500);
            const body=norm(await page.locator('body').innerText());
            const ok=body.includes(norm(term))||((term==='Antak'||term==='Zantac')&&body.includes('ranitidina'));
            log('PESQUISA',term,ok?'OK':'FALHOU'); expect(ok,'Pesquisa publicada falhou para '+term);
          }
          await input.fill(''); await page.waitForTimeout(250);
          const gastric=page.getByRole('button',{name:/protetores gástricos/i}).first();
          expect(await gastric.count()===1,'Filtro Protetores gástricos ausente');
          if(await gastric.count()){
            await gastric.click({force:true}); await page.waitForTimeout(600);
            const value=await input.inputValue(); const body=norm(await page.locator('body').innerText());
            log('FILTRO',value); expect(value.length>0,'Filtro não preencheu a pesquisa'); expect(body.includes('omeprazol')||body.includes('pantoprazol')||body.includes('famotidina'),'Filtro não mostrou o grupo');
          }
          const clear=page.locator('#gm-search-clear-button');
          expect(await clear.count()===1,'Botão X ausente');
          if(await clear.count()){await clear.click({force:true}); await page.waitForTimeout(400); expect((await input.inputValue())==='','Botão X não limpou');}
          const dor=page.getByRole('button',{name:/dor/i}).first();
          expect(await dor.count()===1,'Botão Dor ausente');
          if(await dor.count()){
            await dor.click({force:true}); await page.waitForTimeout(450);
            const open=await page.locator('#categoryModal').count()?await page.locator('#categoryModal').evaluate(el=>el.classList.contains('open')):false;
            expect(open,'Botão Dor não abriu');
            if(await page.locator('#categoryModal').count()) await page.locator('#categoryModal').evaluate(el=>el.classList.remove('open'));
          }
          for(const name of ['Painel de Exames','Prescrições por Trimestre']){
            const button=page.getByText(name,{exact:false}).first(); expect(await button.count()>0,name+' ausente');
            if(await button.count()){const before=runtime.length;await button.click({force:true});await page.waitForTimeout(500);expect(runtime.length===before,name+' gerou erro');await page.keyboard.press('Escape');await page.evaluate(()=>document.querySelectorAll('.modal.open,[role="dialog"].open').forEach(el=>el.classList.remove('open')));}
          }
          expect(runtime.length===0,'Erros de execução: '+runtime.join(' | '));
          if(runtime.length) log('RUNTIME',runtime);
          if(failures.length) log('FALHAS',failures); else log('RESULTADO','PUBLICAÇÃO 126 FINAL APROVADA');
          fs.writeFileSync('verificacao-publicacao-126.txt',report.join('\n\n'),'utf8');
          await page.screenshot({path:'verificacao-publicacao-126.png',fullPage:true});
          await browser.close();
          console.log(report.join('\n\n'));
          if(failures.length) process.exit(1);
          JS
          node verificar-publicacao.mjs
      - name: Enviar evidências
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verificacao-publicacao-real-126
          path: |
            verificacao-publicacao-126.txt
            verificacao-publicacao-126.png
          retention-days: 1

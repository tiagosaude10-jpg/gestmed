name: Auditar autocomplete de patologias

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/auditar-autocomplete.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extrair trechos do autocomplete de patologias
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          pats = [
              'Pesquisar e selecionar uma patologia',
              'Digite ou toque para escolher',
              'condutasSearch',
              'condutaSearch',
              'pathology',
              'patologia',
              'condutasSuggestions',
              'condutaSuggestions',
              'renderCondutas',
              'filtrarPatologias'
          ]
          out = ['# Auditoria autocomplete de patologias', '']
          for pat in pats:
              out.append('## ' + pat)
              start = 0
              found = False
              while True:
                  idx = text.find(pat, start)
                  if idx < 0:
                      break
                  found = True
                  a = max(0, idx - 1400)
                  b = min(len(text), idx + 3200)
                  out.append('```html')
                  out.append(text[a:b])
                  out.append('```')
                  start = idx + len(pat)
              if not found:
                  out.append('Não encontrado.')
              out.append('')
          Path('AUDITORIA_AUTOCOMPLETE.md').write_text('\n'.join(out), encoding='utf-8')
          PY
      - name: Publicar auditoria
        run: |
          git config user.name 'GestaMed Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add AUDITORIA_AUTOCOMPLETE.md
          git commit -m 'Audita autocomplete específico das patologias [skip ci]' || exit 0
          git push

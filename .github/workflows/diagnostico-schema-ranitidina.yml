name: Diagnostico schema ranitidina

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mostrar posições dos registros semelhantes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('backups/gestamed-base-603-1503-fonte.html').read_text(encoding='utf-8')
          lower = text.lower()
          for termo in ['famotidina', 'cimetidina', 'omeprazol', 'pantoprazol']:
              print('\n###', termo)
              start = 0
              found = 0
              while found < 12:
                  idx = lower.find(termo, start)
                  if idx < 0:
                      break
                  a = max(0, idx - 180)
                  b = min(len(text), idx + 360)
                  trecho = text[a:b].replace('\n', ' ')
                  print('POS', idx, trecho)
                  start = idx + len(termo)
                  found += 1
              print('TOTAL MOSTRADO', found)
          PY

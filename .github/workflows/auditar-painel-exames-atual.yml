name: Auditar painel de exames atual

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/auditar-painel-exames-atual.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extrair painel atual
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          needles = [
              'Regra principal:',
              'Resumo rápido — janelas principais',
              '1º trimestre — 0 a 13 semanas e 6 dias',
              'Vacinas da gestante',
              'Hepatite B — HBsAg',
              'function openExames',
              'examesModal'
          ]
          out = ['# Auditoria do painel de exames atual', '']
          for needle in needles:
              idx = text.find(needle)
              out.append('## ' + needle)
              out.append(f'Índice: {idx}')
              if idx >= 0:
                  a = max(0, idx - 2500)
                  b = min(len(text), idx + 12000)
                  out.append('```html')
                  out.append(text[a:b])
                  out.append('```')
              out.append('')
          Path('AUDITORIA_PAINEL_EXAMES_ATUAL.md').write_text('\n'.join(out), encoding='utf-8')
          PY
      - name: Publicar auditoria
        run: |
          git config user.name 'GestaMed Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add AUDITORIA_PAINEL_EXAMES_ATUAL.md
          git commit -m 'Audita painel de exames atualmente publicado [skip ci]' || exit 0
          git push
